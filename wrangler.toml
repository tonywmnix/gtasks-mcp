name = "gtasks-mcp-cf"
main = "src/worker.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# KV namespace for storing OAuth state, tokens, and client registrations.
# Create it with: wrangler kv namespace create OAUTH_KV 
# Then replace the id below with the output ID.
# For local dev (`wrangler dev`), a local KV store is used automatically.
[[kv_namespaces]]
binding = "OAUTH_KV"
id = "7d77f5e84e14402a8016e83ee150b950"

# Required secrets — set via Cloudflare dashboard (Variables and Secrets):
#   GOOGLE_CLIENT_ID
#   GOOGLE_CLIENT_SECRET
#   WORKER_URL   # e.g. https://gtasks-mcp-cf.your-account.workers.dev
#
# Optional: pass your Google refresh token directly as the Bearer token in your
# local MCP client config — no extra Cloudflare secrets needed.
#
# For local dev, put these in .dev.vars (gitignored):
#   GOOGLE_CLIENT_ID=...
#   GOOGLE_CLIENT_SECRET=...
#   WORKER_URL=http://localhost:8787
#   GOOGLE_REFRESH_TOKEN=...
